name: Windows Electron Build

on:
  workflow_dispatch:
  push:
    branches: [main]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ACTIONS_ALLOW_USE_UNSECURE_NODE_VERSION: true

jobs:
  build-windows-installer:
    runs-on: windows-latest
    timeout-minutes: 60

    defaults:
      run:
        shell: pwsh

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'
          cache-dependency-path: |
            app/frontend/package-lock.json
            app/backend/package-lock.json

      - name: Install frontend dependencies
        working-directory: app/frontend
        run: npm ci

      - name: Build Windows installer
        working-directory: app/frontend
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npm run build:win

      - name: Show build output
        run: |
          Get-ChildItem -Path app/frontend -Directory -Filter "dist-electron-win-*" | Sort-Object LastWriteTime -Descending | Select-Object -First 3 | Format-List FullName,LastWriteTime
          Get-ChildItem -Path app/frontend -Recurse -File -Include "*.exe","*.yml","*.yaml" | Where-Object { $_.FullName -like "*dist-electron-win-*" } | Select-Object FullName,Length | Format-Table -AutoSize

      - name: Upload Windows installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ github.run_number }}
          if-no-files-found: error
          path: |
            app/frontend/dist-electron-win-*/**/*setup.exe
            app/frontend/dist-electron-win-*/**/builder-effective-config.yaml
            app/frontend/dist-electron-win-*/**/builder-debug.yml
